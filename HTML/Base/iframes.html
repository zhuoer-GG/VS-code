HTML框架可以使得在同一浏览器窗口显示多个页面,
其中<frame>标签可以构建框架页面来分割浏览器窗口，<iframe>标签用于页内框架

通过使用框架，你可以在同一个浏览器窗口中显示不止一个页面。
iframe语法:
    <iframe src="url链接"></iframe> 
该URL指向不同的网页。

height 和 width 属性用来定义iframe标签的高度与宽度。
属性默认以像素为单位, 但是你可以指定其按比例显示 (如："80%")。
示例
<iframe src="/run/demo_iframe.html" width="180" height="180"></iframe>

frameborder 属性用于定义iframe表示是否显示边框。
设置属性值为 "0" 移除iframe的边框:
示例
<iframe src="/run/demo_iframe.html" name="iframe"></iframe>
<p><a href="" target="iframe">CAINIAOPLUS.COM</a></p>
