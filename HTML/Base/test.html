<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
<title>HTML基础教程(cainiaoplus.com)</title>
</head>
<body>
    <h1>我的第一个网页标题</h1>
    <p>这里是网页段落,可以写网页描述和内容。</p>
    <p><font color="red">我的第一个网页红色文字。</font></p>
</body>
</html>

<!-- <!DOCTYPE html> 声明为 HTML5 文档
<html> 元素是 HTML 页面的根元素
<head> 元素包含了文档的元（meta）数据，如 <meta charset="utf-8"> 定义网页编码格式为 utf-8。
<title> 元素描述了文档的标题
<body> 元素包含了可见的页面内容
<h1> 元素定义一个大标题
<p> 元素定义一个段落 -->
